<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Login Page</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            background:#000;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:380px;
            padding:40px;
            background:#0d0d0d;
            border-radius:15px;
            box-shadow:0 0 30px #b000ff;
            text-align:center;
        }

        .login-box h2{
            color:#00ffff;
            margin-bottom:25px;
            letter-spacing:2px;
        }

        .login-box input{
            width:100%;
            padding:12px;
            margin:12px 0;
            border:none;
            outline:none;
            border-radius:8px;
            background:#eaf1ff;
            font-size:15px;
        }

        .login-box button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            color:#fff;
            background:linear-gradient(90deg,#00ffff,#ff00ff);
        }

        .error{
            color:red;
            margin-top:10px;
        }

        .forgot{
            margin-top:12px;
        }

        .forgot a{
            color:#00ffff;
            text-decoration:none;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login Portal</h2>
    
<form method="POST" action="{% url 'login' %}">
    {% csrf_token %}

    <input 
        type="text" 
        name="username" 
        placeholder="Username" 
        required
    >

    <input 
        type="password" 
        name="password" 
        placeholder="Password" 
        required
    >

    <button type="submit">Login</button>
    {% if error %}
    <div class="error">{{ error }}</div>
{% endif %}


    
</form>
</div>

</body>
</html>
